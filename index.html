<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./assets/css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <title>KaraokeFlix</title>
  </head>
  <body>
    <button
      class="btn btn-danger sidebar-toggle bx bx-menu"
      data-bs-toggle="offcanvas"
      data-bs-target="#karaokeSidebar"
      aria-controls="karaokeSidebar"
    ></button>

    <div id="reserveMarquee" class="reserve-marquee hidden" aria-live="polite">
      <span class="reserve-label">RESERVE</span>
      <span id="reserveDigits" class="reserve-digits">00000</span>
      <span id="reserveTitle" class="reserve-title">No selection</span>
      <span class="reserve-hint">Use arrows and Enter to confirm</span>
    </div>

    <button
      id="fs-doc-button"
      class="btn btn-danger fullscreen-btn bx bx-fullscreen"
    ></button>

    <main id="player-area">
      <div class="video-wrapper">
        <video id="videoPlayer"></video>
        <div id="nowPlayingBox" class="now-playing">🎤 No song playing</div>
      </div>
    </main>

    <div
      class="offcanvas offcanvas-start text-bg-dark"
      tabindex="-1"
      id="karaokeSidebar"
      aria-labelledby="karaokeSidebarLabel"
    >
      <div class="offcanvas-header">
        <h5 class="offcanvas-title" id="karaokeSidebarLabel">Karaoke Menu</h5>
        <button
          type="button"
          class="btn-close btn-close-white"
          data-bs-dismiss="offcanvas"
          aria-label="Close"
        ></button>
      </div>
      <div class="offcanvas-body">
        <button
          class="btn btn-outline-light w-100 mb-3 bx bx-folder"
          onclick="pickFolder()"
        >
          Pick Folder
        </button>
        <div class="number-entry mb-4">
          <label for="songCodeInput">Song code</label>
          <input
            id="songCodeInput"
            class="form-control song-code-input"
            type="text"
            inputmode="numeric"
            maxlength="5"
            autocomplete="off"
            placeholder="00001"
          />
          <small class="text-muted"
            >Type a code or use number keys, then press Enter to reserve.</small
          >
        </div>

        <div class="sidebar-section">
          <h6>Playlist</h6>
          <div id="playlist" class="sidebar-list"></div>
        </div>
        <div class="sidebar-section">
          <h6>Queue</h6>
          <div id="queue" class="sidebar-list"></div>
        </div>
      </div>
    </div>

    <script src="./assets/js/script.js"></script>
    <script src="https://unpkg.com/boxicons@2.1.4/js/boxicons.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
